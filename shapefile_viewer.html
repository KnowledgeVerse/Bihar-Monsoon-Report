<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bihar Shapefile Viewer</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      #map {
        height: 100vh;
        width: 100%;
      }
      .info {
        padding: 6px 8px;
        font:
          14px/16px Arial,
          Helvetica,
          sans-serif;
        background: white;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
      }
      .info h4 {
        margin: 0 0 5px;
        color: #777;
      }
      /* जिले के नाम के लिए Label का Style */
      .district-label {
        background: transparent;
        border: none;
        box-shadow: none;
        font-weight: bold;
        font-size: 12px;
        color: #000;
        text-shadow:
          1px 1px 0 #fff,
          -1px -1px 0 #fff,
          1px -1px 0 #fff,
          -1px 1px 0 #fff;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- shp.js for parsing shapefiles -->
    <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.location.protocol === "file:") {
          alert(
            "चेतावनी: आप फाइल को सीधे खोल रहे हैं। मैप डेटा लोड करने के लिए कृपया VS Code में 'Live Server' का उपयोग करें।",
          );
        }

        // 1. Map को Initialize करें
        const map = L.map("map").setView([25.6, 85.6], 7); // Bihar के center पर zoom करें

        // 2. OpenStreetMap टाइल्स जोड़ें (यह मैप का background है)
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        }).addTo(map);

        // 3. Shapefile के लिए संभावित paths (Robust Loading)
        const candidates = [
          "data/Bihar_Districts_Shapefile/Bihar",
          "data/Bihar_Districts_Shapefile/bihar",
          "Bihar_Map/Bihar_Districts_Shapefile/Bihar",
          "Bihar_Districts_Shapefile/Bihar",
        ];

        const tryLoad = async () => {
          for (const base of candidates) {
            try {
              const shpRes = await fetch(base + ".shp");
              if (shpRes.ok) {
                const shpBuffer = await shpRes.arrayBuffer();
                const dbfRes = await fetch(base + ".dbf");
                if (!dbfRes.ok) continue;
                const dbfBuffer = await dbfRes.arrayBuffer();
                let prjStr = null;
                try {
                  const prjRes = await fetch(base + ".prj");
                  if (prjRes.ok) prjStr = await prjRes.text();
                } catch (e) {}
                return { shpBuffer, dbfBuffer, prjStr };
              }
            } catch (e) {
              console.log("Path failed:", base);
            }
          }
          throw new Error("Shapefile not found in any candidate path.");
        };

        // 4. Load Function Call
        tryLoad()
          .then(({ shpBuffer, dbfBuffer, prjStr }) => {
            // shp.js का उपयोग करके GeoJSON में बदलें
            const geojson = shp.combine([
              shp.parseShp(shpBuffer, prjStr || undefined),
              shp.parseDbf(dbfBuffer),
            ]);

            // 5. GeoJSON को मैप पर जोड़ें
            const geojsonLayer = L.geoJSON(geojson, {
              style: function (feature) {
                // हर जिले के लिए style सेट करें
                return {
                  fillColor: "#3388ff", // नीला रंग
                  weight: 2,
                  opacity: 1,
                  color: "white", // सफेद बॉर्डर
                  dashArray: "3",
                  fillOpacity: 0.5,
                };
              },
              onEachFeature: function (feature, layer) {
                // जिले का नाम Tooltip में दिखाएं
                if (feature.properties && feature.properties.D_NAME) {
                  layer.bindTooltip(feature.properties.D_NAME, {
                    permanent: true,
                    direction: "center",
                    className: "district-label",
                  });
                }
              },
            }).addTo(map);

            // मैप को shapefile के bounds में fit करें
            map.fitBounds(geojsonLayer.getBounds());
          })
          .catch((error) => {
            console.error("Shapefile लोड करने में त्रुटि:", error);
            alert(
              "Shapefile लोड नहीं हो सका। कृपया सुनिश्चित करें कि फाइलें 'data/Bihar_Districts_Shapefile/' फोल्डर में मौजूद हैं और आप Live Server का उपयोग कर रहे हैं।",
            );
          });
      });
    </script>
  </body>
</html>
